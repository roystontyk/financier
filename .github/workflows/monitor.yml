name: Finance Deal Monitor

on:
  schedule:
    - cron: '10 21 * * *'
  workflow_dispatch:
  # This section allows the Cloudflare Worker to trigger a scan via /deals
  repository_dispatch:
    types: [manual_trigger]

jobs:
  run-scraper:
    runs-on: ubuntu-latest
    permissions:
      contents: write 
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        # Added htmldate and certifi to prevent the previous "ModuleNotFoundError"
        run: pip install requests beautifulsoup4 htmldate certifi

      - name: Run Aggressive Scraper
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python scripts/main.py

      - name: Save Progress (Deduplication)
        run: |
          git config --global user.name "DealBot-Automator"
          git config --global user.email "bot@github.com"
          git add processed_links.txt || true
          git commit -m "Update processed links [skip ci]" || true
          git push
