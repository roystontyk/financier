name: Finance Deal Monitor

on:
  schedule:
    # 21:10 UTC is 8:10 AM Melbourne (Summer/AEDT) 
    # and 7:10 AM Melbourne (Winter/AEST)
    - cron: '10 21 * * *'
  
  # This line enables the manual "Run workflow" button in the GitHub UI
  workflow_dispatch:

jobs:
  run-scraper:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Needed to save processed_links.txt back to repo
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install requests beautifulsoup4

      - name: Run Aggressive Scraper
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python scripts/main.py

      - name: Save Progress (Deduplication)
        run: |
          git config --global user.name "DealBot-Automator"
          git config --global user.email "bot@github.com"
          git add processed_links.txt || true
          git commit -m "Update processed links [skip ci]" || true
          git push
